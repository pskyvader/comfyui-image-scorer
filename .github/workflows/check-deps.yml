name: Check Dependency Sync

on:
  push:
    paths:
      - "pyproject.toml"
      - "requirements.txt"
  pull_request:
    paths:
      - "pyproject.toml"
      - "requirements.txt"

jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Check requirements.txt matches pyproject.toml
        run: |
          uv pip compile pyproject.toml --output-file=- | diff - requirements.txt