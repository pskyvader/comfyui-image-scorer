<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Ranking System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- D3.js (for Chain Map) -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 500: '#8b5cf6', 600: '#7c3aed' },
                        dark: { 800: '#1e1e2d', 900: '#151521' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/index.css">
    <!-- Section Specific Styles -->
    <link rel="stylesheet" href="/static/comparison/compare.css">
    <link rel="stylesheet" href="/static/gallery/gallery.css">
    <link rel="stylesheet" href="/static/maps/maps.css">
    <link rel="stylesheet" href="/static/database/db.css">
    <link rel="stylesheet" href="/static/data/transform.css">
    <link rel="stylesheet" href="/static/training/training.css">
    <link rel="stylesheet" href="/static/analysis/analysis.css">
</head>

<body class="min-h-screen custom-scrollbar font-sans antialiased flex flex-col">
    <!-- Nav -->
    <nav class="glass  top-0 z-50 shadow-lg border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-500">
                Image Ranker</h1>
            <div class="flex items-center gap-3">
                <span id="status-indicator"
                    class="hidden sm:inline-block px-3 py-1 text-xs font-semibold rounded-full bg-blue-500/20 text-blue-400 border border-blue-500/30">Ready</span>
                <button class="nav-toggle" id="nav-toggle-btn" aria-label="Menu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" class="w-6 h-6">
                        <path d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>
        </div>
        <div class="mobile-nav-menu" id="mobile-nav-menu">
            <a href="#compare">Compare</a>
            <a href="#gallery">Gallery</a>
            <a href="#chains">Maps</a>
            <a href="#db">Database</a>
            <a href="#data">Data Transform</a>
            <a href="#training">Training</a>
            <a href="#analysis">Analysis</a>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-content" class="flex-grow container mx-auto px-2 py-4 md:px-4 md:py-8">
        <!-- Section content injected by SPA router -->
    </main>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Core Logic -->
    <script src="/js/logger.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>

    <!-- Section Logic -->
    <script src="/static/comparison/compare.js"></script>
    <script src="/static/gallery/gallery.js"></script>
    <!-- Graph Map (Split for Maintainability) -->
    <script src="/static/maps/graph_map/constants.js"></script>
    <script src="/static/maps/graph_map/simulation.js"></script>
    <script src="/static/maps/graph_map/canvas_renderer.js"></script>
    <script src="/static/maps/graph_map/renderer.js"></script>
    <script src="/static/maps/graph_map/main.js"></script>
    <script src="/static/maps/graph_map/controls.js"></script>
    <script src="/static/maps/graph_map/overlay.js"></script>
    <script src="/static/maps/graph_map/interactions.js"></script>
    <script src="/static/maps/graph_map/backend.js"></script>

    <!-- Section Controllers -->
    <script src="/static/database/db.js"></script>
    <script src="/static/data/transform.js"></script>
    <script src="/static/training/training.js"></script>
    <script src="/static/analysis/analysis.js"></script>

    <!-- Router -->
    <script src="/js/index.js"></script>
</body>

</html>
