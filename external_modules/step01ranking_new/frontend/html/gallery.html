<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Image Ranking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 500: '#8b5cf6', 600: '#7c3aed' },
                        dark: { 800: '#1e1e2d', 900: '#151521' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f1015; color: #e2e8f0; }
        .glass { background: rgba(30, 30, 46, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .gallery-item:hover { border-color: #8b5cf6; transform: scale(1.02); box-shadow: 0 10px 25px rgba(139, 92, 246, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e1e2d; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        /* Modal arrows */
        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            color: white; background: rgba(0,0,0,0.6);
            cursor: pointer; border-radius: 50%; z-index: 1010;
            transition: background 0.2s, border-color 0.2s;
            border: 1px solid rgba(255,255,255,0.15);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .nav-arrow svg { width: 24px; height: 24px; pointer-events: none; }
        .nav-arrow:hover { background: rgba(0,0,0,0.85); border-color: #8b5cf6; }
        .nav-arrow:active { background: rgba(139, 92, 246, 0.4); }
        .nav-prev { left: 12px; }
        .nav-next { right: 12px; }
        @media (max-width: 640px) {
            .nav-arrow { width: 40px; height: 40px; }
            .nav-arrow svg { width: 20px; height: 20px; }
            .nav-prev { left: 6px; }
            .nav-next { right: 6px; }
        }
    </style>
</head>
<body class="min-h-screen custom-scrollbar font-sans antialiased flex flex-col">
    <nav class="glass sticky top-0 z-50 shadow-lg border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-500">Image Ranker</h1>
            <ul class="flex space-x-6 items-center">
                <li><a href="/" class="text-gray-300 hover:text-white transition">Compare</a></li>
                <li><a href="/gallery.html" class="text-white bg-white/10 px-4 py-2 rounded-lg font-medium shadow transition">Gallery</a></li>
                <li><span id="status-indicator" class="px-3 py-1 text-sm font-semibold rounded-full bg-blue-500/20 text-blue-400 border border-blue-500/30">Loading...</span></li>
            </ul>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-8">
        <div class="glass rounded-2xl p-6 shadow-2xl relative overflow-hidden">
            <!-- Controls -->
            <div class="flex flex-wrap gap-4 items-end mb-8 bg-dark-800/50 p-4 rounded-xl border border-white/5">
                <div class="flex flex-col gap-1 flex-1 min-w-[150px]">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Tier Filter</label>
                    <select id="tier-filter" class="bg-dark-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none text-white">
                        <option value="">All Tiers</option>
                        <option value="0">Tier 0 (0.0-0.1)</option>
                        <option value="1">Tier 1 (0.1-0.2)</option>
                        <option value="2">Tier 2 (0.2-0.3)</option>
                        <option value="3">Tier 3 (0.3-0.4)</option>
                        <option value="4">Tier 4 (0.4-0.5)</option>
                        <option value="5">Tier 5 (0.5-0.6)</option>
                        <option value="6">Tier 6 (0.6-0.7)</option>
                        <option value="7">Tier 7 (0.7-0.8)</option>
                        <option value="8">Tier 8 (0.8-0.9)</option>
                        <option value="9">Tier 9 (0.9-1.0)</option>
                    </select>
                </div>

                <div class="flex flex-col gap-1 flex-1 min-w-[150px]">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Sort</label>
                    <select id="sort-filter" class="bg-dark-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none text-white">
                        <option value="score_desc">Score (High to Low)</option>
                        <option value="score_asc">Score (Low to High)</option>
                        <option value="comparisons_asc">Comparisons (Low to High)</option>
                        <option value="comparisons_desc">Comparisons (High to Low)</option>
                        <option value="confidence_desc">Confidence (High to Low)</option>
                        <option value="confidence_asc">Confidence (Low to High)</option>
                        <option value="newest">Newest</option>
                    </select>
                </div>

                <div class="flex flex-col gap-1 flex-[2] min-w-[200px]">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Search</label>
                    <input type="text" id="search-query" placeholder="Filename..." class="bg-dark-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none text-white w-full">
                </div>
            </div>

            <div id="gallery-status" class="text-center text-gray-400 mb-6 font-medium">Loading gallery...</div>

            <!-- Grid -->
            <div id="gallery-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                <!-- Items injected by JS -->
            </div>

            <!-- Infinite Scroll Sentinel -->
            <div id="scroll-sentinel" class="h-16 flex items-center justify-center mt-8 text-gray-500 opacity-0 transition-opacity">
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-purple-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Loading more...
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="image-modal" class="fixed inset-0 z-[1000] hidden bg-black/90 backdrop-blur-sm items-center justify-center p-4">
        <span class="modal-close absolute top-6 right-8 text-4xl text-gray-400 hover:text-white cursor-pointer z-[1010]">&times;</span>
        
        <div id="modal-prev" class="nav-arrow nav-prev">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
        </div>
        <div id="modal-next" class="nav-arrow nav-next">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </div>

        <div class="relative max-w-6xl w-full h-full max-h-[95vh] flex flex-col items-center overflow-y-auto custom-scrollbar p-2 md:p-6" id="modal-container">
            <img id="modal-image" src="" alt="Full size" class="max-w-full max-h-[70vh] md:max-h-[80vh] object-contain rounded-xl shadow-2xl border border-white/10 mb-4 bg-dark-900 flex-shrink-0">
            <div class="glass p-4 md:p-6 rounded-xl text-center w-full max-w-4xl border border-white/10 flex-shrink-0 mb-8">
                <p id="modal-filename" class="text-white font-medium break-all mb-4 text-xs md:text-sm opacity-80"></p>
                <div id="modal-metadata" class="flex flex-wrap justify-center gap-3 text-[10px] md:text-xs">
                    <!-- Injected by JS -->
                </div>
                
                <!-- History Section -->
                <div id="modal-history" class="mt-6 pt-6 border-t border-white/10 hidden">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="flex flex-col">
                            <h3 class="text-xs font-bold text-green-400 uppercase tracking-widest mb-3 flex items-center justify-center">
                                <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span> Won Against
                            </h3>
                            <div id="history-wins" class="flex flex-col gap-2 max-h-[200px] overflow-y-auto custom-scrollbar pr-2">
                                <!-- Wins injected by JS -->
                            </div>
                        </div>
                        <div class="flex flex-col">
                            <h3 class="text-xs font-bold text-red-400 uppercase tracking-widest mb-3 flex items-center justify-center">
                                <span class="w-2 h-2 bg-red-500 rounded-full mr-2"></span> Lost Against
                            </h3>
                            <div id="history-losses" class="flex flex-col gap-2 max-h-[200px] overflow-y-auto custom-scrollbar pr-2">
                                <!-- Losses injected by JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/gallery.js"></script>
</body>
</html>
