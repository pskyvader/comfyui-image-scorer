<div class="glass rounded-2xl shadow-2xl relative overflow-hidden">
    <!-- Header with Padding -->
    <header class="p-6 md:p-8 pb-4 flex flex-wrap justify-between items-end gap-6">
        <div class="mb-2">
            <h2 class="text-2xl font-bold text-white">Chain Visualization</h2>
            <p class="text-gray-400 text-sm">Visual representation of image hierarchies and connected components.</p>
        </div>
        
        <div class="flex-grow grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-7 gap-4 w-full">
            <!-- Component Size Filter -->
            <div class="flex flex-col gap-1 bg-dark-800/50 px-4 py-2 rounded-xl border border-white/5 w-full col-span-1 lg:col-span-2">
                <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider flex justify-between">
                    <span>Component Size</span>
                    <span class="text-purple-400"><span id="min-comp-val">1</span> - <span id="max-comp-val">Max</span></span>
                </label>
                <div class="relative h-6 mt-1">
                    <div class="slider-track"></div>
                    <input type="range" id="max-comp-filter" min="1" max="30" value="30" class="range-slider">
                    <input type="range" id="min-comp-filter" min="1" max="30" value="1" class="range-slider">
                </div>
            </div>

            <!-- Chain Length Filter -->
            <div class="flex flex-col gap-1 bg-dark-800/50 px-4 py-2 rounded-xl border border-white/5 w-full col-span-1 lg:col-span-2">
                <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider flex justify-between">
                    <span>Chain Depth</span>
                </label>
                <div class="dual-slider-container relative h-6 mt-1">
                    <input type="range" id="min-chain-filter" min="1" max="30" value="1" class="range-slider">
                    <input type="range" id="max-chain-filter" min="1" max="30" value="30" class="range-slider">
                </div>
                <div class="flex justify-between text-[10px] text-gray-500 mt-1">
                    <span id="min-chain-val">1</span>
                    <span id="max-chain-val">Max</span>
                </div>
            </div>

            <!-- Comparisons Filter -->
            <div class="flex flex-col gap-1 bg-dark-800/50 px-4 py-2 rounded-xl border border-white/5 w-full col-span-1 lg:col-span-2">
                <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider flex justify-between">
                    <span>Node Comparisons</span>
                    <span class="text-purple-400"><span id="min-comp-count-val">0</span> - <span id="max-comp-count-val">Max</span></span>
                </label>
                <div class="relative h-6 mt-1">
                    <div class="slider-track"></div>
                    <input type="range" id="max-comp-count-filter" min="0" max="10" value="10" class="range-slider">
                    <input type="range" id="min-comp-count-filter" min="0" max="10" value="0" class="range-slider">
                </div>
            </div>

            <!-- Collapsible Filter -->
            <div class="flex flex-col gap-1 bg-dark-800/50 px-4 py-2 rounded-xl border border-white/5 w-full">
                <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider flex justify-between">
                    <span>Collapsible Groups</span>
                </label>
                <select id="collapsible-filter" class="w-full bg-dark-900 text-white text-xs border border-white/10 rounded px-2 py-1 outline-none focus:border-purple-500">
                    <option value="all">Show All</option>
                    <option value="only">Only Collapsible</option>
                    <option value="exclude">Exclude Collapsible</option>
                </select>
            </div>
        </div>

        <div class="flex gap-2 w-full md:w-auto justify-center md:justify-end items-center">
            <div id="filter-delay-container" class="hidden flex-grow md:flex-grow-0 md:w-48 bg-dark-900 h-2 rounded-full overflow-hidden border border-white/5 mr-2">
                <div id="filter-delay-bar" class="h-full bg-purple-500 w-0 transition-all duration-300"></div>
            </div>
            <button id="compare-selected-btn" class="hidden px-6 py-2 bg-pink-600 hover:bg-pink-500 text-white rounded-lg transition text-sm font-bold shadow-lg flex items-center gap-2 animate-pulse">
                Compare Selected (<span id="selected-count">0</span>)
            </button>
            <button id="reset-view-btn" class="px-6 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg transition text-sm font-bold shadow-lg">Reset View</button>
            <button id="refresh-btn" class="px-6 py-2 bg-purple-600 hover:bg-purple-500 text-white rounded-lg transition text-sm font-bold shadow-lg">Refresh</button>
        </div>
    </header>

    <!-- Visualization Box with Padding -->
    <div class="px-6 md:px-8 pb-8">
        <div id="graph-container" class="relative group rounded-xl overflow-hidden border border-white/5 shadow-inner bg-[#0b0b14] min-h-[500px] md:min-h-[70vh]">
            <!-- The SVG will be injected here by the script -->

            <!-- Overlay controls -->
            <div class="absolute top-4 right-4 z-20 flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-auto">
                <button id="zoom-in-btn" class="p-2 bg-black/60 hover:bg-black/80 rounded-lg text-white border border-white/10" title="Zoom In">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                </button>
                <button id="zoom-out-btn" class="p-2 bg-black/60 hover:bg-black/80 rounded-lg text-white border border-white/10" title="Zoom Out">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4" /></svg>
                </button>
                <button id="play-pause-btn" class="p-2 bg-black/60 hover:bg-black/80 rounded-lg text-white border border-white/10" title="Pause/Resume Simulation">
                    <svg id="pause-icon" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" /></svg>
                    <svg id="play-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
                </button>
                <button id="toggle-labels-btn" class="p-2 bg-black/60 hover:bg-black/80 rounded-lg text-white border border-white/10" title="Toggle Filenames">
                    <svg id="tag-icon-off" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" /></svg>
                    <svg id="tag-icon-on" class="w-5 h-5 hidden text-purple-400" fill="currentColor" viewBox="0 0 24 24"><path d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" /></svg>
                </button>
            </div>

            <!-- Zoom scale indicator -->
            <div id="graph-stats" class="absolute bottom-4 left-4 bg-black/60 backdrop-blur-md border border-white/10 rounded-lg p-3 text-[10px] flex gap-4 text-gray-400 z-10 pointer-events-none">
            <div class="flex flex-col"><span class="text-white font-bold" id="stat-nodes">0</span><span>Nodes</span></div>
            <div class="flex flex-col"><span class="text-white font-bold" id="stat-edges">0</span><span>Links</span></div>
            <div class="flex flex-col"><span class="text-white font-bold" id="stat-comparisons">0</span><span>Comparisons</span></div>
            <div class="flex flex-col"><span class="text-white font-bold" id="stat-components">0</span><span>Groups</span></div>
            <div class="flex flex-col border-l border-white/10 pl-4">
                <span class="text-purple-400 font-bold" id="zoom-scale">1.00x</span>
                <span id="view-coords">X: 0, Y: 0</span>
            </div>
        </div>
            <div id="tooltip" class="tooltip hidden"></div>
            <div id="node-details" class="absolute top-4 left-4 z-30 hidden w-56 glass p-3 rounded-xl border border-white/10 shadow-2xl max-h-[80%] overflow-y-auto scrollbar-thin scrollbar-thumb-gray-600 scrollbar-track-transparent">
                <!-- Node details content -->
            </div>
        </div>
    </div>

    <!-- Stats/Legend with Padding -->
    <div class="px-6 md:px-8 pb-8 grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="stats-panel glass p-4 rounded-xl border border-white/5">
            <h4 class="text-purple-400 font-bold text-xs uppercase mb-2">Network Stats</h4>
            <div class="flex flex-wrap gap-4 text-[10px]">
                <div class="flex items-center gap-1.5"><span class="text-gray-500">Nodes:</span> <span id="stat-nodes-bottom" class="text-white font-bold">-</span></div>
                <div class="flex items-center gap-1.5"><span class="text-gray-500">Links:</span> <span id="stat-edges-bottom" class="text-white font-bold">-</span></div>
                <div class="flex items-center gap-1.5"><span class="text-gray-500">Comparisons:</span> <span id="stat-comparisons-bottom" class="text-white font-bold">-</span></div>
                <div class="flex items-center gap-1.5"><span class="text-gray-500">Groups:</span> <span id="stat-components-bottom" class="text-white font-bold">-</span></div>
            </div>
        </div>
        <div class="legend-panel glass p-4 rounded-xl border border-white/5 md:col-span-2">
            <h4 class="text-pink-400 font-bold text-xs uppercase mb-2">Legend</h4>
            <div class="flex flex-wrap gap-4 text-[11px] text-gray-400">
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]"></div><span>High Score (>0.6)</span></div>
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-yellow-500 shadow-[0_0_8px_rgba(234,179,8,0.5)]"></div><span>Neutral (0.4-0.6)</span></div>
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]"></div><span>Low Score (&lt;0.4)</span></div>
                <div class="flex items-center gap-2"><div class="flex items-center"><div class="w-4 h-0.5 bg-gray-500"></div><div class="w-0 h-0 border-t-[3px] border-t-transparent border-b-[3px] border-b-transparent border-l-[5px] border-l-gray-500"></div><div class="w-4 h-0.5 bg-gray-500"></div></div><span>Winner &rarr; Loser (at middle)</span></div>
            </div>
        </div>
    </div>
</div>
