    <div id="comparison-status-top" class="text-center text-gray-500 mb-6 text-sm opacity-50 hidden">Pair ready for comparison</div>
    
    <div id="error-box" class="hidden my-8 p-8 border-2 border-red-500/50 bg-red-900/20 rounded-2xl text-center shadow-xl backdrop-blur-md">
        <h2 id="error-title" class="text-2xl font-bold text-red-400 mb-4">Error</h2>
        <p id="error-message" class="text-gray-300 text-lg"></p>
    </div>

    <div id="cards-container" class="flex flex-col md:flex-row gap-4 md:gap-8 items-center justify-center relative min-h-[400px]">
        <!-- Loading Overlay -->
        <div id="loading-overlay" class="absolute inset-0 z-20 flex items-center justify-center bg-black/60 backdrop-blur-md rounded-2xl opacity-0 pointer-events-none">
            <div class="flex flex-col items-center">
                <div class="w-16 h-16 border-4 border-purple-500/20 border-t-purple-500 rounded-full animate-spin mb-4"></div>
                <p id="loading-overlay-text" class="text-purple-300 font-medium animate-pulse">Finding next pair...</p>
            </div>
        </div>

        <!-- Left Card -->
        <div class="image-card glass rounded-xl overflow-hidden flex-1 w-full max-w-lg transition-all duration-300 cursor-pointer border border-white/5 left-card">
            <div class="relative overflow-hidden h-[300px] sm:h-[350px] md:h-[400px]">
                <img id="left-image" src="" alt="" class="w-full h-full object-contain opacity-0 transition-opacity duration-300">
            </div>
            <div class="p-2 md:p-4 bg-dark-800/80 border-t border-white/5">
                <div class="flex items-center gap-1 mb-1 md:mb-2 min-w-0">
                    <p id="left-filename" class="font-medium text-[11px] md:text-sm text-gray-300 truncate min-w-0"></p>
                </div>
                
                <!-- Simplified Info Line -->
                <div id="left-stats-line" class="text-[10px] md:text-[11px] text-gray-400 font-mono mt-1 mb-3 text-center tracking-tighter opacity-80">
                    <!-- Score: 0.00 | Chain: - | Comp: - | Comps: 0 -->
                </div>

                <button id="left-button" class="w-full py-2 md:py-3 rounded-lg font-bold text-white bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 shadow-lg transform transition active:scale-95 text-sm md:text-base">← Better</button>
            </div>
        </div>

        <!-- VS -->
        <div class="vs-badge absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 md:relative md:left-0 md:top-0 md:translate-x-0 md:translate-y-0 z-10 w-10 h-10 md:w-16 md:h-16 rounded-full bg-dark-900 border-2 border-purple-500 flex items-center justify-center font-black text-sm md:text-xl text-purple-400 shadow-[0_0_20px_rgba(168,85,247,0.4)] backdrop-blur-md">
            VS
        </div>

        <!-- Right Card -->
        <div class="image-card glass rounded-xl overflow-hidden flex-1 w-full max-w-lg transition-all duration-300 cursor-pointer border border-white/5 right-card">
            <div class="relative overflow-hidden h-[300px] sm:h-[350px] md:h-[400px]">
                <img id="right-image" src="" alt="" class="w-full h-full object-contain opacity-0 transition-opacity duration-300">
            </div>
            <div class="p-2 md:p-4 bg-dark-800/80 border-t border-white/5">
                <div class="flex items-center gap-1 mb-1 md:mb-2 min-w-0">
                    <p id="right-filename" class="font-medium text-[11px] md:text-sm text-gray-300 truncate min-w-0"></p>
                </div>
                
                <!-- Simplified Info Line -->
                <div id="right-stats-line" class="text-[10px] md:text-[11px] text-gray-400 font-mono mt-1 mb-3 text-center tracking-tighter opacity-80">
                    <!-- Score: 0.00 | Chain: - | Comp: - | Comps: 0 -->
                </div>

                <button id="right-button" class="w-full py-2 md:py-3 rounded-lg font-bold text-white bg-gradient-to-r from-pink-600 to-rose-600 hover:from-pink-500 hover:to-rose-500 shadow-lg transform transition active:scale-95 text-sm md:text-base">Better →</button>
            </div>
        </div>
    </div>

    <div class="mt-8 pt-6 border-t border-white/10 flex flex-col items-center">
        <div id="global-stats-footer" class="text-gray-400 text-sm mb-4 font-medium tracking-wide">
            Total: <span id="stat-total" class="text-white">0</span> | 
            Comparisons: <span id="stat-comparisons" class="text-white">0</span> | 
            Components: <span id="stat-components" class="text-white">0</span> | 
            Chains: <span id="stat-chains" class="text-white">0</span> | 
            Active (L<span id="stat-level" class="text-white">-</span>): <span id="stat-active" class="text-yellow-400">0</span> | 
            Ready (L<span id="stat-next-level-num" class="text-green-400">-</span>): <span id="stat-next-level" class="text-green-400">0</span> | 
            Compared (L<span id="stat-base-level" class="text-white">-</span>): <span id="stat-ranked" class="text-white">0</span>
        </div>
        
        <!-- Legend - populated by CompareView.renderDescriptions() from backend PHASES data -->
        <div id="phase-descriptions" class="text-[10px] text-gray-400 max-w-xl text-center mb-2 leading-relaxed space-y-1"></div>
        <div class="flex gap-4">
            <button id="skip-button" class="px-6 py-2 rounded-full border border-gray-600 text-gray-300 hover:bg-gray-800 hover:text-white transition text-sm">Skip Pair</button>
            <button id="reset-cache-button" class="px-4 py-2 rounded-full border border-orange-900/50 text-orange-400/50 hover:text-orange-400 transition text-xs">Reset Cache</button>
            <button id="toggle-debug" class="px-4 py-2 rounded-full border border-purple-900/50 text-purple-400/50 hover:text-purple-400 transition text-xs">Debug Info</button>
        </div>

        <!-- Debug Panel -->
        <div id="debug-panel" class="hidden mt-6 w-full bg-black/40 border border-purple-500/20 rounded-xl p-4 text-[10px] font-mono text-purple-300/80">
            <h4 class="text-purple-400 font-bold mb-2 uppercase tracking-widest border-b border-purple-500/10 pb-1">Selection Telemetry</h4>
            <div id="debug-content" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Filled by JS -->
            </div>
        </div>
    </div>
</div>
