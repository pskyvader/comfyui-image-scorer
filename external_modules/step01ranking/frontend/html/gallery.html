<div class="gallery-wrapper" id="gallery-wrapper">
    <div class="gallery-header">
        <h2>Scored Images Gallery</h2>
    </div>

    <div class="gallery-filters">
        <div class="gallery-filters-header">
            <h3>Filters</h3>
            <button class="btn btn-secondary" id="toggle-filters-btn" onclick="toggleAdvancedFilters()">Show Advanced
                Filters</button>
        </div>

        <div class="filter-group">
            <label>Effective Score (Score + Modifier/10)</label>
            <div class="slider-container">
                <input type="range" id="filter-effective-score-min" min="1" max="5" value="1" step="0.1">
                <input type="range" id="filter-effective-score-max" min="1" max="5" value="5" step="0.1">
                <div class="slider-values">
                    <span id="effective-score-min-val">1.0</span> - <span id="effective-score-max-val">5.0</span>
                </div>
            </div>
        </div>

        <div id="advanced-filters" style="display: none;">
            <div class="filter-group">
                <label>Comparison Count</label>
                <input type="range" id="filter-comparisons-min" min="0" max="10" value="0">
                <input type="range" id="filter-comparisons-max" min="0" max="10" value="10">
                <div class="slider-values">
                    <span id="comparisons-min-val">0</span> - <span id="comparisons-max-val">10</span>
                </div>
            </div>
            <div class="filter-group">
                <label>Volatility (0-1, Absolute Value)</label>
                <div class="slider-container">
                    <input type="range" id="filter-volatility-min" class="slider-min" min="0" max="1" value="0"
                        step="0.05">
                    <input type="range" id="filter-volatility-max" class="slider-max" min="0" max="1" value="1"
                        step="0.05">
                    <div class="slider-values">
                        <span id="volatility-min-val">0.0</span> - <span id="volatility-max-val">1.0</span>
                    </div>
                </div>
            </div>
        </div>


        <button class="btn btn-reset" onclick="resetFilters()">Reset Filters</button>
    </div>

    <div class="gallery-grid" id="gallery-grid">
        <div class="gallery-loading">Loading images...</div>
    </div>

    <div id="gallery-sentinel" class="gallery-infinite-scroll-loader">
        <div class="spinner"></div>
        <span style="margin-left: 10px;">Loading more...</span>
    </div>

    <div id="image-modal" class="image-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeImageModal()">&times;</button>
            <div class="modal-nav">
                <button class="btn btn-modal-nav" id="modal-prev-btn" onclick="previousImageInModal()">← Prev</button>
                <button class="btn btn-modal-nav" id="modal-next-btn" onclick="nextImageInModal()">Next →</button>
            </div>
            <img id="modal-image" src="" alt="Gallery image" class="modal-image">
            <div class="modal-info">
                <h2 id="modal-title"></h2>
                <div id="modal-meta"></div>
            </div>
        </div>
    </div>
</div>
