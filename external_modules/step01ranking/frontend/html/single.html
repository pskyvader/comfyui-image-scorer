<!-- Single Mode Content -->
<div class="preview" id="single-preview">
    <img id="preview" alt="preview" class="hidden">
</div>

<div class="controls" id="single-controls">
    <div class="score-btns">
        <button class="btn" onclick="singleMode.submitScore(1)">1</button>
        <button class="btn" onclick="singleMode.submitScore(2)">2</button>
        <button class="btn" onclick="singleMode.submitScore(3)">3</button>
        <button class="btn" onclick="singleMode.submitScore(4)">4</button>
        <button class="btn" onclick="singleMode.submitScore(5)">5</button>
    </div>
    <br />
    <button class="btn btn-gray" onclick="singleMode.skipImage()">Skip</button>
</div>
