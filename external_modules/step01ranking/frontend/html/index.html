<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Ranking System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- D3.js (for Chain Map) -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 500: '#8b5cf6', 600: '#7c3aed' },
                        dark: { 800: '#1e1e2d', 900: '#151521' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/index.css">
    <!-- Section Specific Styles -->
    <link rel="stylesheet" href="/css/compare.css">
    <link rel="stylesheet" href="/css/gallery.css">
    <link rel="stylesheet" href="/css/chains.css">
</head>

<body class="min-h-screen custom-scrollbar font-sans antialiased flex flex-col">
    <!-- Nav -->
    <nav class="glass md:sticky top-0 z-50 shadow-lg border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-500">
                Image Ranker</h1>
            <ul class="flex space-x-4 sm:space-x-6 items-center">
                <li><a href="#compare" class="text-gray-300 hover:text-white transition text-sm sm:text-base">Compare</a></li>
                <li><a href="#gallery" class="text-gray-300 hover:text-white transition text-sm sm:text-base">Gallery</a></li>
                <li><a href="#chains" class="text-gray-300 hover:text-white transition text-sm sm:text-base">Chain Map</a></li>
                <li><button id="backup-button" class="text-gray-400 hover:text-white transition text-xs sm:text-sm border border-gray-700 px-2 py-1 rounded" title="Sync DB to JSON Files">Backup</button></li>
                <li><span id="status-indicator" class="hidden sm:inline-block px-3 py-1 text-sm font-semibold rounded-full bg-blue-500/20 text-blue-400 border border-blue-500/30">Ready</span></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-content" class="flex-grow container mx-auto px-2 py-4 md:px-4 md:py-8">
        <!-- Templates will be injected here -->
    </main>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Core Logic -->
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    
    <!-- Section Logic -->
    <script src="/js/compare.js"></script>
    <script src="/js/gallery.js"></script>
    <!-- Graph Map (Split for Maintainability) -->
    <script src="/js/graph_map/constants.js"></script>
    <script src="/js/graph_map/simulation.js"></script>
    <script src="/js/graph_map/canvas_renderer.js"></script>
    <script src="/js/graph_map/renderer.js"></script>
    <script src="/js/graph_map/main.js"></script>
    <script src="/js/graph_map/controls.js"></script>
    <script src="/js/graph_map/overlay.js"></script>
    <script src="/js/graph_map/interactions.js"></script>
    <script src="/js/graph_map/backend.js"></script>
    
    <!-- Router -->
    <script src="/js/index.js"></script>
</body>

</html>
