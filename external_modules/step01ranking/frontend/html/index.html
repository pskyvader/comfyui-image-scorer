<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Step 1 Scoring Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/single.css">
    <link rel="stylesheet" href="/css/batch.css">
    <link rel="stylesheet" href="/css/compare.css">
    <link rel="stylesheet" href="/css/gallery.css">
</head>

<body>
    <div class="card">
        <div id="top">
            <header>
                <h2>Image Scoring Tool</h2>
                <div class="meta-line" id="status-text">Loading…</div>
            </header>

            <!-- Loader (shown during scanning) -->
            <div id="loader" class="loader">
                <div class="spinner"></div>
                <div class="loader-text">Loading…</div>
            </div>

            <!-- Mode selector -->
            <div class="mode-selector">
                <button class="btn btn-mode active" id="mode-single" onclick="switchMode('single')">Single Mode</button>
                <button class="btn btn-mode" id="mode-batch" onclick="switchMode('batch')">Batch Mode (30)</button>
                <button class="btn btn-mode" id="mode-compare" onclick="switchMode('compare')">Compare Mode</button>
                <button class="btn btn-mode" id="mode-gallery" onclick="switchMode('gallery')">Gallery</button>
            </div>
        </div>

        <!-- Mode containers (loaded dynamically) -->
        <div id="single-container" class="mode-container visible"></div>
        <div id="batch-container" class="mode-container"></div>
        <div id="compare-container" class="mode-container"></div>
        <div id="gallery-container" class="mode-container"></div>
    </div>

    <!-- Mode-specific scripts -->
    <script src="/js/client.js"></script>
    <script src="/js/single.js"></script>
    <script src="/js/batch.js"></script>
    <script src="/js/compare.js"></script>
    <script src="/js/gallery.js"></script>
</body>

</html>
