<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Step 1 Scoring Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="card">
        <header>
            <h2>Image Scoring Tool</h2>
            <div class="meta-line" id="counter">Loading images…</div>
        </header>
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <div class="loader-text">Loading…</div>
        </div>

        <!-- Single image preview + loader -->
        <div class="preview" id="single-preview">
            <img id="preview" alt="preview" class="hidden">
        </div>

        <!-- Mode selector -->
        <div class="mode-selector">
            <button class="btn btn-mode active" id="mode-single" onclick="switchMode('single')">Single Mode</button>
            <button class="btn btn-mode" id="mode-batch" onclick="switchMode('batch')">Batch Mode (30)</button>
            <button class="btn btn-mode" id="mode-compare" onclick="switchMode('compare')">Compare Mode</button>
        </div>

        <!-- Single mode controls -->
        <div class="controls" id="single-controls">
            <div class="score-btns">
                <button class="btn" onclick="submitScore(1)">1</button>
                <button class="btn" onclick="submitScore(2)">2</button>
                <button class="btn" onclick="submitScore(3)">3</button>
                <button class="btn" onclick="submitScore(4)">4</button>
                <button class="btn" onclick="submitScore(5)">5</button>
            </div>
            <br />
            <button class="btn btn-gray" onclick="skipImage()">Skip</button>
            <button class="btn btn-teal hidden" onclick="refreshCount()">Refresh</button>

        </div>

        <!-- Batch mode grid -->
        <div id="batch-area" class="hidden">
            <div class="batch-controls">
                <button class="btn btn-green" onclick="submitBatchScores()">Submit All Scores</button>
                <button class="btn btn-gray" onclick="switchMode('single')">Back to Single Mode</button>
            </div>
            <div id="batch-grid" class="batch-grid"></div>
            <div id="batch-remaining" class="meta"></div>
        </div>

        <!-- Compare mode view -->
        <div id="compare-area" class="hidden">
            <div class="compare-container">
                <div class="manual_score">
                    <span>Manual Score:</span>
                    <input type="number" name="score" id="manual_score" value="0" min="0" max="5" step="1">
                </div>


                <div class="compare-pair">
                    <div class="compare-image-wrapper">
                        <img id="compare-left" class="compare-image" alt="left image">
                        <div class="compare-info">
                            <span class="compare-label" id="left_file_id">Image 1</span>
                            <span class="compare-score">Score: <span id="compare-left-score">-</span></span>
                            <span class="compare-count">Count: <span id="compare-left-count">-</span>/10</span>
                        </div>
                        <button class="btn btn-compare" onclick="submitComparison('left')">← Left Better</button>
                    </div>
                    <div class="compare-divider">VS</div>
                    <div class="compare-image-wrapper">
                        <img id="compare-right" class="compare-image" alt="right image">
                        <div class="compare-info">
                            <span class="compare-label" id="right_file_id">Image 2</span>
                            <span class="compare-score">Score: <span id="compare-right-score">-</span></span>
                            <span class="compare-count">Count: <span id="compare-right-count">-</span>/10</span>
                        </div>
                        <button class="btn btn-compare" onclick="submitComparison('right')">Right Better →</button>
                    </div>
                </div>
                <div class="compare-controls">
                    <button class="btn btn-gray" onclick="skipComparison()">Skip Pair</button>
                    <button class="btn btn-gray" onclick="switchMode('single')">Back to Single Mode</button>
                </div>
            </div>
        </div>

        <div id="meta" class="meta"></div>

        <!-- Footer status -->
        <div id="status">Waiting for images…</div>
    </div>

    <script src="/client.js"></script>
</body>

</html>
