<div id="transform-container" class="max-w-3xl mx-auto space-y-6">
    <!-- Data Pipeline -->
    <div class="glass rounded-2xl p-6 shadow-2xl">
        <div class="section-title">Data Pipeline</div>
        <div class="flex flex-wrap gap-2 mb-3">
            <button class="action-btn primary" data-action="prepare-data">▶ Run Full Prepare</button>
            <button class="action-btn primary" data-action="prepare-data-rebuild">▶ Rebuild + Prepare</button>
            <button class="action-btn" data-action="prepare-scores">📊 Rebuild Scores Only</button>
            <button class="action-btn" data-action="prepare-from-splits">📦 Rebuild from Splits</button>
            <button class="action-btn" data-action="prepare-text-only">📝 Text-Only Reprocess</button>
            <button class="action-btn primary" data-action="scan-import">📂 Scan & Import New</button>
        </div>
        <div class="flex flex-wrap gap-1 text-xs text-gray-500 items-center">
            <span>Limit:</span>
            <button class="px-2 py-0.5 rounded bg-white/5 hover:bg-white/10" data-prepare-limit="0">All</button>
            <button class="px-2 py-0.5 rounded bg-white/5 hover:bg-white/10" data-prepare-limit="10">10</button>
            <button class="px-2 py-0.5 rounded bg-white/5 hover:bg-white/10" data-prepare-limit="50">50</button>
            <button class="px-2 py-0.5 rounded bg-white/5 hover:bg-white/10" data-prepare-limit="100">100</button>
            <span class="ml-2 text-purple-400" id="prepare-limit-display">Current: All</span>
        </div>
    </div>

    <!-- Log Output -->
    <div class="glass rounded-2xl p-6 shadow-2xl">
        <div class="flex items-center justify-between mb-3">
            <div class="section-title mb-0">Output Log</div>
            <button id="clear-log-btn" class="text-xs text-gray-500 hover:text-white transition">Clear</button>
        </div>
        <div id="log-area" class="log-area" style="max-height: 300px;">
            <div class="text-gray-500">Ready.</div>
        </div>
    </div>
</div>
