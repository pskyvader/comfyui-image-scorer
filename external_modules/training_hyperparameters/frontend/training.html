<div id="training-container" class="max-w-3xl mx-auto space-y-6">
    <!-- Training -->
    <div class="glass rounded-2xl p-6 shadow-2xl">
        <div class="section-title">Training</div>
        <div class="flex flex-wrap gap-2 mb-3">
            <button class="action-btn " data-action="reset-config">Reset Training objects</button>
            <button class="action-btn primary" data-action="train-top">🧠 Train Top Model</button>

            <button class="action-btn" data-action="optimize-hpo">🔬 Optimize Hyperparameters</button>
            <button class="action-btn" data-action="hpo-cycle">🔄 HPO Cycle</button>
        </div>
        <div class="flex flex-wrap gap-2">
            <button class="action-btn" data-action="get-training-config">📋 View Config</button>
            <button class="action-btn danger" data-action="remove-models">🗑 Remove Models</button>
        </div>
    </div>

    <!-- Log Output -->
    <div class="glass rounded-2xl p-6 shadow-2xl">
        <div class="flex items-center justify-between mb-3">
            <div class="section-title mb-0">Output Log</div>
            <button id="clear-log-btn" class="text-xs text-gray-500 hover:text-white transition">Clear</button>
        </div>
        <div id="log-area" class="log-area" style="max-height: 300px;">
            <div class="text-gray-500">Ready.</div>
        </div>
    </div>
</div>
